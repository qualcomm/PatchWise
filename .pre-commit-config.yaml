fail_fast: true
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.7
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args: [--fix]
        exclude: ^patchwise/patch_review/ai_review/prompts/
  
  - repo: local
    hooks:
      - id: check-signoff
        name: Check commit signoff
        entry: |
          bash -c 'grep -q "Signed-off-by:" "$1" || { echo ""; echo "WARNING: Missing Signed-off-by line"; echo "Use: git commit -s"; echo ""; exit 1; }'
        args: [--]
        language: system
        stages: [commit-msg]
        verbose: true